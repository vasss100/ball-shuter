<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Bubble Shooter</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="game-wrapper">
    <div class="game-container" id="gameContainer">
      <canvas id="gameCanvas"></canvas>
      <div class="ui-overlay">
        <div class="top-bar glass">
          <div class="stat">
            <span class="stat-label">Score</span>
            <span class="stat-value" id="scoreDisplay">0</span>
          </div>
          <div class="stat">
            <span class="stat-label">Level</span>
            <span class="stat-value" id="levelDisplay">1</span>
          </div>
        </div>
        <div class="bottom-bar glass">
          <div class="next-bubble">
            <span class="next-label">Next</span>
            <div class="preview-circle" id="nextBubble"></div>
          </div>
        </div>
        <div class="game-over-overlay hidden" id="gameOverOverlay">
          <div class="game-over-content glass">
            <h2>Game Over</h2>
            <p>Score: <span id="finalScore">0</span></p>
            <button class="restart-btn" id="restartBtn">Play Again</button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="js/main.js"></script>
</body>
</html>
